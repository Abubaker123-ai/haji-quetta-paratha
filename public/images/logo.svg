<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0f7f1"/>
      <stop offset="100%" stop-color="#FEFAE0"/>
    </radialGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1A4D2E"/>
    </linearGradient>
    <linearGradient id="saffronG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A24D"/>
      <stop offset="100%" stop-color="#E07B24"/>
    </linearGradient>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4D2E"/>
      <stop offset="50%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#E07B24"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="60" cy="60" r="57" fill="url(#bgG)" stroke="url(#ringG)" stroke-width="3"/>

  <!-- Decorative dashed ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(26,77,46,0.18)" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Tawa shadow -->
  <ellipse cx="60" cy="78" rx="33" ry="7" fill="rgba(26,77,46,0.08)"/>

  <!-- Tawa body -->
  <ellipse cx="60" cy="74" rx="33" ry="7.5" fill="#fff" stroke="url(#greenG)" stroke-width="2"/>
  <ellipse cx="60" cy="73" rx="31" ry="6" fill="#e8f5ec"/>

  <!-- Paratha (saffron/golden) -->
  <ellipse cx="60" cy="67" rx="25" ry="9.5" fill="url(#saffronG)"/>

  <!-- Paratha layer lines -->
  <ellipse cx="60" cy="65.5" rx="21" ry="7"   fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <ellipse cx="60" cy="64"   rx="16" ry="5"   fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.2"/>
  <ellipse cx="60" cy="62.5" rx="11" ry="3.2" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Ghee shine -->
  <ellipse cx="51" cy="65" rx="5"   ry="2.2" fill="rgba(255,255,255,0.3)"  transform="rotate(-20 51 65)"/>
  <ellipse cx="70" cy="66" rx="3.5" ry="1.5" fill="rgba(255,255,255,0.22)" transform="rotate(15 70 66)"/>

  <!-- Steam wisps — green then saffron -->
  <path d="M47 54 Q44 48 47 42 Q50 36 47 31" stroke="url(#greenG)"   stroke-width="2"   stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M60 52 Q57 46 60 40 Q63 34 60 28" stroke="url(#ringG)"    stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M73 54 Q76 48 73 42 Q70 36 73 31" stroke="url(#saffronG)" stroke-width="2"   stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- Tawa handle -->
  <rect x="91" y="70" width="17" height="6" rx="3" fill="url(#greenG)"/>
  <rect x="106" y="71" width="4"  height="4" rx="2" fill="#0F2D1A"/>

  <!-- Top ornament arc -->
  <path d="M38 21 Q60 14 82 21" stroke="url(#ringG)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="13" r="4"   fill="url(#saffronG)"/>
  <circle cx="38" cy="21" r="2.5" fill="url(#greenG)"   opacity="0.85"/>
  <circle cx="82" cy="21" r="2.5" fill="url(#saffronG)" opacity="0.85"/>

  <!-- Decorative dots -->
  <circle cx="25" cy="35" r="2"   fill="url(#saffronG)" opacity="0.6"/>
  <circle cx="95" cy="32" r="2"   fill="url(#greenG)"   opacity="0.6"/>
  <circle cx="18" cy="60" r="1.5" fill="url(#greenG)"   opacity="0.4"/>
  <circle cx="102" cy="55" r="1.5" fill="url(#saffronG)" opacity="0.4"/>

  <!-- Small leaf shapes (fresh/natural feel) -->
  <ellipse cx="28" cy="50" rx="3" ry="1.5" fill="#52B788" opacity="0.5" transform="rotate(-30 28 50)"/>
  <ellipse cx="92" cy="48" rx="3" ry="1.5" fill="#52B788" opacity="0.5" transform="rotate(30 92 48)"/>
</svg>
